<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <title>실시간 통역</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --text-color: #ffffff;
      --bg-color: #000000;
      --base-size: 6.5vw;
      --accent: #16baa9;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg-color);
      color: var(--text-color);
      font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* 상단 바 */
    #topbar {
      flex-shrink: 0;
      padding: 13px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      font-size: 13px;
      color: #9aa3b0;
    }
    #conn-text { font-weight: 500; }

    #conn-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ff5c5c; display: inline-block; margin-right: 7px;
      vertical-align: middle;
    }
    #conn-dot.on { background: var(--accent); box-shadow: 0 0 0 3px rgba(22,186,169,0.18); }

    #size-controls button {
      background: rgba(255,255,255,0.08);
      color: #e6eaf0;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      width: 36px; height: 36px;
      font-size: 18px;
      font-family: inherit;
      margin-left: 7px;
      transition: background 0.15s;
    }
    #size-controls button:active { background: rgba(22,186,169,0.25); }

    #lang-select {
      background: rgba(255,255,255,0.08);
      color: #e6eaf0;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      max-width: 130px;
    }

    /* 자막 영역 */
    #subtitles {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px 18px calc(20px + env(safe-area-inset-bottom));
      gap: 14px;
    }

    .line {
      font-size: var(--base-size);
      font-weight: 700;
      line-height: 1.45;
      color: var(--text-color);
      word-break: keep-all;
      flex-shrink: 0;
    }

    .line.current { color: var(--text-color); }

    #empty {
      margin: auto;
      color: #555;
      font-size: 4.5vw;
      font-weight: 400;
      text-align: center;
      padding: 0 30px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<div id="app">
  <div id="topbar">
    <span><span id="conn-dot"></span><span id="conn-text">연결 중...</span></span>
    <span style="display:flex; align-items:center; gap:8px;">
      <select id="lang-select" onchange="switchLang(this.value)" aria-label="언어 선택">
        <option value="English">English</option>
        <option value="Korean">한국어</option>
        <option value="Japanese">日本語</option>
        <option value="Chinese">中文</option>
        <option value="Spanish">Español</option>
        <option value="French">Français</option>
        <option value="German">Deutsch</option>
        <option value="Arabic">العربية</option>
      </select>
      <span id="size-controls">
        <button onclick="changeSize(-0.5)">－</button>
        <button onclick="changeSize(0.5)">＋</button>
      </span>
    </span>
  </div>

  <div id="subtitles">
    <div id="empty">통역이 시작되면<br>이곳에 자막이 표시됩니다.</div>
  </div>
</div>

<script>
  const subtitles = document.getElementById("subtitles");
  const connDot = document.getElementById("conn-dot");
  const connText = document.getElementById("conn-text");

  let currentText = "";
  let lines = [];
  let baseSize = 6.5;

  function changeSize(delta) {
    baseSize = Math.max(3.5, Math.min(11, baseSize + delta));
    document.documentElement.style.setProperty("--base-size", baseSize + "vw");
    render(currentText);
  }

  function applySettings(s) {
    if (s.text_color) document.documentElement.style.setProperty("--text-color", s.text_color);
    if (s.bg_color) document.documentElement.style.setProperty("--bg-color", s.bg_color);
  }

  // 셀폰이 볼 언어. 빈 값이면 서버 대표 언어를 따라감.
  let currentLang = "";
  let langInitialized = false;

  // 초기 설정 불러오기 → 기본 언어를 대표 언어로 맞추고 연결 시작
  fetch("/settings").then(r => r.json()).then(s => {
    applySettings(s);
    if (!langInitialized && s.target_lang) {
      currentLang = s.target_lang;
      const sel = document.getElementById("lang-select");
      if (sel) sel.value = s.target_lang;
      langInitialized = true;
    }
    connect();
  }).catch(() => connect());

  function render(streamingText) {
    const empty = document.getElementById("empty");
    if (empty) empty.remove();

    subtitles.innerHTML = "";

    lines.forEach((text) => {
      const div = document.createElement("div");
      div.className = "line";
      div.textContent = text;
      subtitles.appendChild(div);
    });

    if (streamingText) {
      const div = document.createElement("div");
      div.className = "line current";
      div.textContent = streamingText;
      subtitles.appendChild(div);
    }

    // 넘치면 맨 위부터 제거
    while (lines.length > 0 && subtitles.scrollHeight > subtitles.clientHeight) {
      lines.shift();
      subtitles.removeChild(subtitles.firstChild);
    }
  }

  let ws = null;

  function wsUrl() {
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    let u = proto + "//" + location.host + "/ws-display";
    if (currentLang) u += "?lang=" + encodeURIComponent(currentLang);
    return u;
  }

  function connect() {
    const sock = new WebSocket(wsUrl());
    ws = sock;

    sock.onopen = () => {
      connDot.classList.add("on");
      connText.textContent = "연결됨";
    };
    sock.onclose = () => {
      if (ws !== sock) return;      // 언어 전환으로 교체된 소켓이면 재연결 안 함
      connDot.classList.remove("on");
      connText.textContent = "재연결 중...";
      setTimeout(connect, 2000);    // 자동 재연결
    };
    sock.onerror = () => {
      connDot.classList.remove("on");
      connText.textContent = "재연결 중...";
    };

    sock.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === "ping") return;
      if (msg.type === "settings") {
        applySettings(msg.data);
      } else if (msg.type === "clear") {
        if (currentText.trim()) lines.push(currentText.trim());
        currentText = "";
        render("");
      } else if (msg.type === "done") {
        // 완료
      } else if (msg.type === "chunk") {
        currentText += msg.data.replace(/\\n/g, "\n");
        render(currentText);
      }
    };
  }

  // 언어 변경: 자막을 비우고 새 언어로 재연결
  function switchLang(lang) {
    currentLang = lang;
    langInitialized = true;
    lines = [];
    currentText = "";
    subtitles.innerHTML = '<div id="empty">언어를 변경했습니다.<br>다음 문장부터 새 언어로 표시됩니다.</div>';
    const old = ws;
    ws = null;
    if (old) { try { old.close(); } catch (e) {} }
    connect();
  }

  // 화면 꺼짐 방지 시도 (지원 기기에서만)
  if ("wakeLock" in navigator) {
    let wakeLock = null;
    const requestWake = async () => {
      try { wakeLock = await navigator.wakeLock.request("screen"); } catch (e) {}
    };
    requestWake();
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") requestWake();
    });
  }
</script>

</body>
</html>
